<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="explosion" cx="280" cy="200" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFAA00"/>
      <stop offset="40%" stop-color="#FF8800"/>
      <stop offset="80%" stop-color="#FF4400" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="280" cy="220" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFAA00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFAA00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- No background - transparent for adaptive icon foreground -->

  <!-- Background glow from explosion -->
  <circle cx="280" cy="220" r="200" fill="url(#glow)"/>

  <!-- Explosion burst - large spikes behind tank -->
  <polygon points="280,80 300,170 320,60 310,175 360,90 315,180 390,130 318,190 400,180 315,205 390,230 310,215 370,290 300,225 330,310 290,230 280,320 280,220" fill="#FF8800" opacity="0.9"/>
  <polygon points="280,80 260,170 240,65 270,175 210,95 265,185 180,140 262,195 175,195 265,210 195,260 270,218 220,300 275,225 255,315 278,230 280,320 280,220" fill="#FF8800" opacity="0.9"/>

  <!-- Inner explosion glow -->
  <circle cx="280" cy="210" r="70" fill="url(#explosion)"/>
  <circle cx="280" cy="210" r="45" fill="#FFAA00" opacity="0.8"/>
  <circle cx="280" cy="210" r="25" fill="#FFDD44" opacity="0.7"/>

  <!-- Tank silhouette - simple geometric -->
  <!-- Tank body (main hull) -->
  <rect x="140" y="310" width="200" height="70" rx="8" ry="8" fill="#FF4444"/>

  <!-- Tank body highlight -->
  <rect x="140" y="310" width="200" height="30" rx="8" ry="0" fill="#FF5555" opacity="0.5"/>

  <!-- Tank turret base -->
  <rect x="200" y="280" width="100" height="40" rx="6" ry="6" fill="#E03030"/>

  <!-- Tank barrel - angled up-right -->
  <rect x="265" y="195" width="18" height="95" rx="4" ry="4" fill="#CC2828" transform="rotate(25, 274, 285)"/>

  <!-- Barrel tip / muzzle flash connection -->
  <rect x="268" y="190" width="12" height="20" rx="3" ry="3" fill="#BB2222" transform="rotate(25, 274, 200)"/>

  <!-- Track/wheels area -->
  <rect x="135" y="365" width="210" height="40" rx="20" ry="20" fill="#CC2828"/>

  <!-- Track wheels -->
  <circle cx="175" cy="385" r="16" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="215" cy="385" r="16" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="255" cy="385" r="16" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="295" cy="385" r="16" fill="#1a1a2e" opacity="0.6"/>

  <!-- Wheel centers -->
  <circle cx="175" cy="385" r="6" fill="#CC2828"/>
  <circle cx="215" cy="385" r="6" fill="#CC2828"/>
  <circle cx="255" cy="385" r="6" fill="#CC2828"/>
  <circle cx="295" cy="385" r="6" fill="#CC2828"/>
</svg>
